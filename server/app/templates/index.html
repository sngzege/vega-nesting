<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vega Nesting</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="authBar">
        <span id="userInfo" style="font-weight:bold; margin-right: 1rem;"></span>
        <input id="usernameInput" placeholder="Kullanıcı adı" style="width: 150px;">
        <button type="button" class="secondary" onclick="login()">Giriş</button>
        <button type="button" class="danger" onclick="logout()">Çıkış</button>
    </div>

    <div id="projectPanel" style="display:none;">
        <h3>Projelerim</h3>
        <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:0.5rem;">
            <input type="text" id="projectName" placeholder="Proje adı" style="flex:1; padding:0.5rem;">
            <button type="button" class="primary" onclick="saveProject()">Kaydet</button>
            <button type="button" class="secondary" onclick="clearProject()">Yeni</button>
        </div>
        <ul id="projectList"></ul>
        <div id="projectFilesInfo" style="display:none; margin-top:0.5rem; color:#555;"></div>
    </div>

    <h1>Vega Nesting - 2D Sac Levha Yerleştirme</h1>

    <form id="nestForm">
        <div class="form-row">
            <div>
                <label for="sheetWidth">Sac Genişliği (mm)</label>
                <input type="number" id="sheetWidth" name="sheetWidth" step="0.1" required>
            </div>
            <div>
                <label for="sheetHeight">Sac Yüksekliği (mm)</label>
                <input type="number" id="sheetHeight" name="sheetHeight" step="0.1" required>
            </div>
            <div>
                <label for="space">Boşluk Payı (mm)</label>
                <input type="number" id="space" name="space" step="0.1" value="0">
            </div>
            <div>
                <label for="sheetMaterial">Sac Malzemesi</label>
                <input type="text" id="sheetMaterial" name="sheetMaterial" list="materialList" value="ST37" placeholder="ST37">
            </div>
            <div style="display:none;">
                <input type="hidden" id="sheetCount" name="sheetCount" value="9999">
            </div>
        </div>

        <datalist id="materialList">
            <option value="ST37">
            <option value="ST52">
            <option value="ALM">
            <option value="304">
        </datalist>

        <div id="fileInputSection">
            <h3>Parçalar</h3>
            <div id="fileRows">
                <div class="file-row">
                    <input type="file" name="files" accept=".dxf" required>
                    <input type="number" name="count" value="1" min="1" placeholder="Adet">
                    <input type="text" name="rotations" placeholder="Dönüşler (0,90,180,270)">
                    <input type="text" name="material" placeholder="Malzeme" list="materialList" style="width:80px;">
                    <input type="text" name="thickness" placeholder="Kalınlık" style="width:80px;">
                    <button type="button" class="danger" onclick="removeRow(this)">Sil</button>
                </div>
            </div>
            <button type="button" class="secondary" onclick="addRow()">+ Parça Ekle</button>
        </div>

        <div id="projectFilesSection" style="display:none;">
            <h3>Proje Dosyaları</h3>
            <ul id="projectFileList" style="padding-left: 1.5rem;"></ul>
        </div>

        <div style="margin-top: 1rem;">
            <button type="submit" class="primary">Hesapla</button>
        </div>
    </form>

    <div id="results"></div>

    <script>
        const activeProjectIdKey = 'activeProjectId';

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadUser() {
            try {
                const resp = await fetch('/api/me');
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('userInfo').textContent = 'Kullanıcı: ' + data.username;
                    document.getElementById('usernameInput').style.display = 'none';
                    document.querySelector('#authBar button:first-of-type').style.display = 'none';
                    document.getElementById('projectPanel').style.display = 'block';
                    loadProjects();
                } else {
                    document.getElementById('userInfo').textContent = '';
                    document.getElementById('projectPanel').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('userInfo').textContent = '';
                document.getElementById('projectPanel').style.display = 'none';
            }
        }

        async function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) { alert('Kullanıcı adı girin'); return; }
            const fd = new FormData();
            fd.append('username', username);
            const resp = await fetch('/api/login', { method: 'POST', body: fd });
            if (resp.ok) {
                loadUser();
            } else {
                alert('Giriş başarısız');
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            location.reload();
        }

        async function loadProjects() {
            try {
                const resp = await fetch('/api/projects');
                const projects = await resp.json();
                const list = document.getElementById('projectList');
                list.innerHTML = '';
                projects.forEach(p => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <a href="#" onclick="loadProject(${p.id}, event)" style="font-weight:bold;">${escapeHtml(p.name)}</a>
                        <span style="color:#555;"> - ${p.sheet_width} x ${p.sheet_height} mm</span>
                        <button type="button" class="danger" style="padding:0.25rem 0.5rem; font-size:0.8rem;" onclick="deleteProject(${p.id})">Sil</button>
                    `;
                    list.appendChild(li);
                });
            } catch (e) {
                console.error('Projects could not be loaded', e);
            }
        }

        async function saveProject() {
            const name = document.getElementById('projectName').value.trim();
            if (!name) { alert('Proje adı girin'); return; }

            const activeId = localStorage.getItem(activeProjectIdKey);
            const isUpdate = !!activeId;

            const form = document.getElementById('nestForm');
            const fd = new FormData(form);
            fd.append('name', name);

            const url = isUpdate ? `/api/projects/${activeId}` : '/api/projects';
            const method = isUpdate ? 'PUT' : 'POST';

            try {
                const resp = await fetch(url, { method, body: fd });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || 'Kaydedilemedi');
                }
                const data = await resp.json();
                localStorage.setItem(activeProjectIdKey, data.project_id || activeId);
                loadProjects();
                if (!isUpdate) {
                    document.getElementById('projectName').value = '';
                }
                alert(isUpdate ? 'Güncellendi' : 'Kaydedildi');
            } catch (e) {
                alert(e.message);
            }
        }

        async function loadProject(id, event) {
            if (event) event.preventDefault();
            try {
                const resp = await fetch(`/api/projects/${id}`);
                if (!resp.ok) { alert('Proje yüklenemedi'); return; }
                const data = await resp.json();

                document.getElementById('sheetWidth').value = data.project.sheet_width;
                document.getElementById('sheetHeight').value = data.project.sheet_height;
                document.getElementById('space').value = data.project.space;
                document.getElementById('sheetMaterial').value = data.project.sheet_material || 'ST37';
                document.getElementById('addOutShape').checked = !!data.project.add_out_shape;
                document.getElementById('projectName').value = data.project.name;

                localStorage.setItem(activeProjectIdKey, id);

                const list = document.getElementById('projectFileList');
                list.innerHTML = '';
                data.files.forEach(f => {
                    const li = document.createElement('li');
                    const mat = f.material || '';
                    const thick = f.thickness || '';
                    const details = [mat, thick].filter(Boolean).join(' - ');
                    li.innerHTML = `<strong>${escapeHtml(f.filename)}</strong> - Adet: ${f.count}${details ? ' - ' + details : ''}`;
                    list.appendChild(li);
                });

                document.getElementById('fileInputSection').style.display = 'none';
                document.getElementById('projectFilesSection').style.display = 'block';
                document.getElementById('projectFilesInfo').style.display = 'block';
                document.getElementById('projectFilesInfo').textContent = 'Yüklenen dosyalar projeden alınacak. Farklı dosyalar için Yeni butonuna basınız.';

                loadProjects();
            } catch (e) {
                alert(e.message);
            }
        }

        async function deleteProject(id) {
            if (!confirm('Proje silinsin mi?')) return;
            const resp = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                const current = localStorage.getItem(activeProjectIdKey);
                if (current == id) {
                    clearProject();
                }
                loadProjects();
            } else {
                alert('Silinemedi');
            }
        }

        function clearProject() {
            localStorage.removeItem(activeProjectIdKey);
            document.getElementById('projectName').value = '';
            document.getElementById('fileInputSection').style.display = 'block';
            document.getElementById('projectFilesSection').style.display = 'none';
            document.getElementById('projectFilesInfo').style.display = 'none';
            document.getElementById('results').innerHTML = '';
            const container = document.getElementById('fileRows');
            container.innerHTML = `
                <div class="file-row">
                    <input type="file" name="files" accept=".dxf" required>
                    <input type="number" name="count" value="1" min="1" placeholder="Adet">
                    <input type="text" name="rotations" placeholder="Dönüşler (0,90,180,270)">
                    <input type="text" name="material" placeholder="Malzeme" list="materialList" style="width:80px;">
                    <input type="text" name="thickness" placeholder="Kalınlık" style="width:80px;">
                    <button type="button" class="danger" onclick="removeRow(this)">Sil</button>
                </div>
            `;
        }

        function addRow() {
            const container = document.getElementById('fileRows');
            const div = document.createElement('div');
            div.className = 'file-row';
            div.innerHTML = `
                <input type="file" name="files" accept=".dxf" required>
                <input type="number" name="count" value="1" min="1" placeholder="Adet">
                <input type="text" name="rotations" placeholder="Dönüşler (0,90,180,270)">
                <input type="text" name="material" placeholder="Malzeme" list="materialList" style="width:80px;">
                <input type="text" name="thickness" placeholder="Kalınlık" style="width:80px;">
                <button type="button" class="danger" onclick="removeRow(this)">Sil</button>
            `;
            container.appendChild(div);
        }

        function removeRow(btn) {
            btn.parentElement.remove();
        }

        let lastSheetWidth = null;
        let lastSheetHeight = null;

        document.getElementById('nestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const results = document.getElementById('results');
            results.innerHTML = '<p>Hesaplanıyor...</p>';

            const formData = new FormData(e.target);
            lastSheetWidth = parseFloat(formData.get('sheetWidth'));
            lastSheetHeight = parseFloat(formData.get('sheetHeight'));
            const space = formData.get('space');
            const sheetMaterial = formData.get('sheetMaterial') || 'ST37';

            const files = formData.getAll('files');
            const counts = formData.getAll('count');
            const rotations = formData.getAll('rotations');
            const materials = formData.getAll('material');
            const thicknesses = formData.getAll('thickness');

            const fd = new FormData();
            fd.append('sheetWidth', lastSheetWidth);
            fd.append('sheetHeight', lastSheetHeight);
            fd.append('space', space);
            fd.append('sheetCount', '9999');
            fd.append('sheetMaterial', sheetMaterial);
            fd.append('counts', JSON.stringify(counts.map(Number)));
            fd.append('rotations', JSON.stringify(rotations.map(r => r ? r.split(',').map(Number) : [])));
            fd.append('fileMaterials', JSON.stringify(materials));
            fd.append('fileThicknesses', JSON.stringify(thicknesses));

            const activeProjectId = localStorage.getItem(activeProjectIdKey);
            if (activeProjectId) {
                fd.append('project_id', activeProjectId);
            } else {
                for (const file of files) {
                    fd.append('files', file);
                }
            }

            try {
                const resp = await fetch('/api/nest', { method: 'POST', body: fd });
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.detail || 'Hata oluştu');
                }

                const jobId = data.job_id;
                pollStatus(jobId, results);
            } catch (err) {
                results.innerHTML = `<div class="error">${err.message}</div>`;
            }
        });

        async function pollStatus(jobId, container) {
            const interval = setInterval(async () => {
                try {
                    const resp = await fetch(`/api/status/${jobId}`);
                    const data = await resp.json();
                    if (data.status === 'done') {
                        clearInterval(interval);
                        renderResults(jobId, data, container);
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        container.innerHTML = `<div class="error">Hata: ${data.error}</div>`;
                    } else {
                        container.innerHTML = '<p>Hesaplama devam ediyor...</p>';
                    }
                } catch (e) {
                    container.innerHTML = `<div class="error">Durum kontrolü hatası</div>`;
                    clearInterval(interval);
                }
            }, 1000);
        }

        function setupZoomPan(svgEl) {
            let scale = 1;
            let panX = 0, panY = 0;

            const vb = svgEl.getAttribute('viewBox').split(' ').map(Number);
            const origW = vb[2], origH = vb[3];

            function updateViewBox() {
                const w = origW * scale;
                const h = origH * scale;
                svgEl.setAttribute('viewBox', `${panX} ${panY} ${w} ${h}`);
            }

            svgEl.addEventListener('wheel', (e) => {
                e.preventDefault();
                const rect = svgEl.getBoundingClientRect();
                const mx = (e.clientX - rect.left) / rect.width;
                const my = (e.clientY - rect.top) / rect.height;

                const factor = e.deltaY > 0 ? 1.1 : 0.9;
                const newScale = Math.max(0.05, Math.min(50, scale * factor));

                const focusX = panX + mx * origW * scale;
                const focusY = panY + my * origH * scale;
                panX = focusX - mx * origW * newScale;
                panY = focusY - my * origH * newScale;
                scale = newScale;
                updateViewBox();
            }, { passive: false });

            let dragging = false, startX, startY, startPanX, startPanY;
            svgEl.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                dragging = true;
                startX = e.clientX;
                startY = e.clientY;
                startPanX = panX;
                startPanY = panY;
                svgEl.style.cursor = 'grabbing';
            });
            window.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const dx = (e.clientX - startX) / rectWidth(svgEl) * origW * scale;
                const dy = (e.clientY - startY) / rectHeight(svgEl) * origH * scale;
                panX = startPanX - dx;
                panY = startPanY - dy;
                updateViewBox();
            });
            window.addEventListener('mouseup', () => {
                if (dragging) {
                    dragging = false;
                    svgEl.style.cursor = '';
                }
            });
        }

        function rectWidth(el) { return el.getBoundingClientRect().width || 1; }
        function rectHeight(el) { return el.getBoundingClientRect().height || 1; }

        function renderResults(jobId, data, container) {
            const stats = data.stats;
            const files = data.output_files || [];
            const sw = lastSheetWidth;
            const sh = lastSheetHeight;
            let html = `<div class="result-item success"><strong>Tamamlandı</strong><br>`;
            html += `İstenen: ${stats.requested} parça<br>`;
            html += `Yerleştirilen: ${stats.placed} parça<br>`;
            html += `Gereken Sac Adedi: ${stats.sheet_count} adet<br>`;
            if (!stats.is_all_placed) {
                html += `<span style="color:#dc2626">Uyarı: Tüm parçalar yerleştirilemedi!</span>`;
            }
            html += `</div>`;

            html += `<div class="result-item">`;
            html += `<label for="outputName" style="display:inline; margin-right:0.5rem;">Çıktı Adı:</label>`;
            html += `<input type="text" id="outputName" placeholder="vega-cikti" style="width:200px; padding:0.4rem;">`;
            html += `</div>`;

            files.forEach((f, idx) => {
                const sheetNum = idx + 1;
                html += `<div class="result-item preview-item">`;
                html += `<div class="preview-header"><strong>Sac ${sheetNum}</strong> <span style="color:#999;font-size:0.85rem;">(tekerlek ile zoom, sürükle ile kaydır)</span></div>`;
                const aspect = (sw && sh) ? (sh / sw * 100) : 50;
                html += `<div class="preview-svg" id="preview-${jobId}-${sheetNum}" style="aspect-ratio:${sw || 1}/${sh || 1}; max-height:400px;"><p>Önizleme yükleniyor...</p></div>`;
                html += `<div class="preview-download">`;
                html += `<button type="button" class="primary" onclick="downloadWithName('${jobId}', '${f}', ${sheetNum})">İndir (DXF)</button>`;
                html += `</div></div>`;
            });

            html += `<div class="result-item">`;
            html += `<button type="button" class="secondary" onclick="downloadAll('${jobId}')">Tümünü İndir (ZIP)</button>`;
            html += `</div>`;

            container.innerHTML = html;

            files.forEach((f, idx) => {
                const sheetNum = idx + 1;
                fetch(`/api/preview/${jobId}/${sheetNum}`)
                    .then(resp => {
                        if (!resp.ok) throw new Error('Preview failed');
                        return resp.text();
                    })
                    .then(svg => {
                        const previewDiv = document.getElementById(`preview-${jobId}-${sheetNum}`);
                        previewDiv.innerHTML = svg;
                        const svgEl = previewDiv.querySelector('svg');
                        if (svgEl) {
                            svgEl.style.width = '100%';
                            svgEl.style.height = '100%';
                            svgEl.style.background = '#fff';
                            svgEl.style.cursor = 'grab';
                            setupZoomPan(svgEl);
                        }
                    })
                    .catch(() => {
                        const previewDiv = document.getElementById(`preview-${jobId}-${sheetNum}`);
                        previewDiv.innerHTML = '<p style="color:#999;">Önizleme yüklenemedi</p>';
                    });
            });
        }

        function downloadWithName(jobId, filename, sheetNum) {
            const nameInput = document.getElementById('outputName');
            const baseName = nameInput ? nameInput.value.trim() : '';
            const suffix = filename.replace(/\.dxf$/i, '');
            const downloadName = baseName ? `${baseName}_sac${sheetNum}` : suffix;
            const link = document.createElement('a');
            link.href = `/api/result/${jobId}/${filename}?name=${encodeURIComponent(downloadName)}`;
            link.download = downloadName + '.dxf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function downloadAll(jobId) {
            window.location.href = `/api/result/${jobId}/all`;
        }

        loadUser();
    </script>
</body>
</html>
